<!doctype html>
<html>

<head>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f1f3f318
        }

        .navbar {
            background: burlywood;
            display: flex;
            justify-content: space-between;
            padding 15px 30px;

        }

        .logo {
            color: cyan;
            font-size: 25px;

        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;

        }

        .menu a {
            color: greenyellow;

            text-decoration: dashed;

        }

        .menu a:hover {
            color: chartreuse;

        }

        .youtube-btn {
            background: red;
            color: white;

            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;

        }

        .youtube-btn:hover {
            background: darkred;
        }

        .song {
            margin: 20px 0;

        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">
            media
        </div>
    </div>
    <div class="song">
        <p>sarah k song</p>
        <a href="https://youtu.be/vWmR4LbIeQA" target="_blank">

            <button class="youtube-btn"> Watch on youtube</button>
        </a>
    </div>
    <div class="song">


        <p>Inuka song</p>
        <a href="https://youtu.be/kFi4dsp4i9U" target="_blank">
            <button class="twitch-btn">Watch on Twitch</button>
        </a>
    </div>

</body>

</html>
